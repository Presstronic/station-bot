version: '3.8'

services:
  postgres:
    container_name: station-bot-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-station_bot}"
      POSTGRES_USER: "${POSTGRES_USER:-station_bot}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change_me}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Run scripts/gen-certs.sh to generate these files before starting the stack.
      # The key file must be owned by the postgres user (uid 70 on alpine) and chmod 600;
      # gen-certs.sh prints the chown/chmod commands to run after generation.
      - ./certs/server.crt:/var/lib/postgresql/server.crt:ro
      - ./certs/server.key:/var/lib/postgresql/server.key:ro
    command: >
      postgres
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/server.crt
        -c ssl_key_file=/var/lib/postgresql/server.key
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-network

  discord-bot:
    container_name: station-bot
    image: ghcr.io/presstronic/station-bot:latest
    env_file:
      - .env.production
    cap_drop:
      - ALL
    read_only: true # Container filesystem is read-only except for specified volumes
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bot-network
    # Uncomment if your bot has a web server or exposed ports
    # ports:
    #   - "3000:3000"
    tmpfs:
      - /tmp # Required for tsx IPC socket; read_only: true makes the root fs unwritable
    volumes:
      - /etc/localtime:/etc/localtime:ro # Sync container time with host
      - ./logs:/app/logs # Persistent writable logs directory
      # CA cert generated by scripts/gen-certs.sh — used to verify the Postgres server certificate.
      - ./certs/ca.crt:/app/certs/ca.crt:ro
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-info}" # Default log level to info if not set
      DATABASE_URL: "${DATABASE_URL:-postgresql://${POSTGRES_USER:-station_bot}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-station_bot}}"
      PG_SSL_ENABLED: "true"
      PG_SSL_REJECT_UNAUTHORIZED: "true"
      PG_SSL_CA_PATH: "/app/certs/ca.crt"

networks:
  bot-network:
    driver: bridge

volumes:
  postgres-data:
