name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE: ghcr.io/presstronic/station-bot

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: station_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="v$(node -p 'require("./package.json").version')"
          if [ "${TAG}" != "${EXPECTED}" ]; then
            echo "Tag ${TAG} does not match package.json version ${EXPECTED}" >&2
            exit 1
          fi

      - name: Run quality gate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/station_bot_test
        run: npm run quality

  build-and-push:
    name: Build And Push Image
    runs-on: ubuntu-latest
    needs: validate-release
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_short: ${{ steps.version.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version and short SHA
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          SHA="${GITHUB_SHA}"
          SHA_SHORT="$(printf '%s' "${SHA}" | cut -c1-7)"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    concurrency:
      group: station-bot-deploy
      cancel-in-progress: false

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Configure SSH known_hosts
        env:
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write production environment file
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ORGANIZATION_MEMBER_ROLE_ID: ${{ secrets.ORGANIZATION_MEMBER_ROLE_ID }}
          ORGANIZATION_MEMBER_ROLE_NAME: ${{ secrets.ORGANIZATION_MEMBER_ROLE_NAME }}
          NOMINATION_WORKER_ENABLED: ${{ secrets.NOMINATION_WORKER_ENABLED }}
          B2_ACCOUNT_ID: ${{ secrets.B2_ACCOUNT_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
          BACKUP_HEALTHCHECK_URL: ${{ secrets.BACKUP_HEALTHCHECK_URL }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" 'mkdir -p /opt/station-bot'
          cat <<EOF | ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" 'cat > /opt/station-bot/.env.production && chmod 600 /opt/station-bot/.env.production'
          DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
          CLIENT_ID=${CLIENT_ID}
          DATABASE_URL=${DATABASE_URL}
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          ORGANIZATION_MEMBER_ROLE_ID=${ORGANIZATION_MEMBER_ROLE_ID}
          ORGANIZATION_MEMBER_ROLE_NAME=${ORGANIZATION_MEMBER_ROLE_NAME}
          NOMINATION_WORKER_ENABLED=${NOMINATION_WORKER_ENABLED}
          B2_ACCOUNT_ID=${B2_ACCOUNT_ID}
          B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
          B2_BUCKET=${B2_BUCKET}
          BACKUP_HEALTHCHECK_URL=${BACKUP_HEALTHCHECK_URL}
          EOF

      - name: Write production rclone config
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          B2_ACCOUNT_ID: ${{ secrets.B2_ACCOUNT_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" 'mkdir -p ~/.config/rclone'
          cat <<EOF | ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" 'cat > ~/.config/rclone/rclone.conf && chmod 600 ~/.config/rclone/rclone.conf'
          [b2]
          type = b2
          account = ${B2_ACCOUNT_ID}
          key = ${B2_APPLICATION_KEY}
          hard_delete = false
          EOF

      - name: Update repo to release tag
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" \
            "cd /opt/station-bot && git fetch --tags origin && git checkout ${VERSION}"

      - name: Pre-deploy database backup
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          SHA_SHORT: ${{ needs.build-and-push.outputs.sha_short }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" \
            "cd /opt/station-bot && BACKUP_LABEL=pre-deploy-${SHA_SHORT} bash infra/scripts/backup-db.sh"

      - name: Verify pre-deploy backup uploaded
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          SHA_SHORT: ${{ needs.build-and-push.outputs.sha_short }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" \
            "set -euo pipefail
             B2_BUCKET=\"\$(grep '^B2_BUCKET=' /opt/station-bot/.env.production | cut -d= -f2- || true)\"
             if [ -z \"\${B2_BUCKET}\" ]; then
               echo 'B2_BUCKET could not be read from /opt/station-bot/.env.production' >&2
               exit 1
             fi
             FOUND_BACKUP=0
             for BACKUP_MONTH in \"\$(date +%Y%m)\" \"\$(date -d '1 month ago' +%Y%m)\"; do
               set +e
               RCLONE_OUTPUT=\"\$(rclone ls \"b2:\${B2_BUCKET}/postgres/\${BACKUP_MONTH}/\" 2>&1)\"
               RCLONE_EXIT=\$?
               set -e
               if [ \"\${RCLONE_EXIT}\" -ne 0 ]; then
                 echo \"rclone ls failed for postgres/\${BACKUP_MONTH}/: \${RCLONE_OUTPUT}\" >&2
                 exit 1
               fi
               if printf '%s\n' \"\${RCLONE_OUTPUT}\" | grep -q \"pre-deploy-${SHA_SHORT}\\.sql.gz\"; then
                 FOUND_BACKUP=1
                 break
               fi
             done
             if [ \"\${FOUND_BACKUP}\" -ne 1 ]; then
               echo 'Pre-deploy backup file was not found in the current or previous month prefix' >&2
               exit 1
             fi"

      - name: Deploy production
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" \
            "cd /opt/station-bot && BOT_IMAGE_TAG=${VERSION} bash infra/scripts/deploy.sh"

      - name: Verify container is running
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -o StrictHostKeyChecking=yes "${VPS_USER}@${VPS_HOST}" "
            ROOTLESS_SOCK=\"/run/user/\$(id -u)/docker.sock\"
            if [ -S \"\${ROOTLESS_SOCK}\" ]; then
              export DOCKER_HOST=\"unix://\${ROOTLESS_SOCK}\"
            fi
            set +e
            INSPECT_OUTPUT=\"\$(docker inspect --format='{{.State.Status}}' station-bot 2>&1)\"
            INSPECT_EXIT=\$?
            set -e
            if [ \"\${INSPECT_EXIT}\" -ne 0 ]; then
              if printf '%s' \"\${INSPECT_OUTPUT}\" | grep -qi 'No such object'; then
                STATUS=''
              else
                echo \"docker inspect failed: \${INSPECT_OUTPUT}\" >&2
                exit 1
              fi
            else
              STATUS=\"\${INSPECT_OUTPUT}\"
            fi
            if [ \"\${STATUS}\" != 'running' ]; then
              echo 'station-bot container is not running (status: '\${STATUS:-not found}')' >&2
              docker logs station-bot --tail 50 || true
              exit 1
            fi
            echo \"station-bot is running\"
          "

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy-production
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-and-push.outputs.version }}
          name: ${{ needs.build-and-push.outputs.version }}
          generate_release_notes: true
