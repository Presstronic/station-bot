# docker-compose.ssl.yml — SSL/TLS overlay for docker-compose.prod.yml
#
# Prerequisites: run scripts/gen-certs.sh and fix server.key ownership first:
#   bash scripts/gen-certs.sh
#   sudo chown 70:70 certs/server.key && sudo chmod 600 certs/server.key
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.ssl.yml up -d

services:
  postgres:
    volumes:
      - ./certs/server.crt:/var/lib/postgresql/server.crt:ro
      - ./certs/server.key:/var/lib/postgresql/server.key:ro
    command: >
      postgres
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/server.crt
        -c ssl_key_file=/var/lib/postgresql/server.key

  discord-bot:
    volumes:
      - ./certs/ca.crt:/app/certs/ca.crt:ro
    environment:
      PG_SSL_ENABLED: "true"
      PG_SSL_REJECT_UNAUTHORIZED: "true"
      PG_SSL_CA_PATH: "/app/certs/ca.crt"
